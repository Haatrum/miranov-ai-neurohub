<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miranov AI Assistant | Neuro-Hub. Version 1.3</title>
    
    <!-- Подключение стилей и Eel -->
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="/eel.js"></script>
    <link rel="icon" type="image/png" href="icon.ico">
    
    <!-- Локальные библиотеки (Offline) -->
    <script src="marked.min.js"></script>
    <script src="highlight.min.js"></script>
    <link rel="stylesheet" href="highlight.css">
</head>
<body>
    <div class="app">
        <!-- САЙДБАР -->
        <div class="sidebar">
            <div class="system-monitor">
                <div class="monitor-header">Активные системы:</div>
                <hr class="monitor-divider">
                
                <div class="monitor-item" id="status-llama">
                    <span class="model-name">Модель - Llama 3</span>
                    <span class="model-status">Думает...</span>
                </div>
                
                <div class="monitor-item" id="status-llava">
                    <span class="model-name">Модель - Llava</span>
                    <span class="model-status">Смотрит...</span>
                </div>
            </div>

            <button onclick="newChat()" class="new-btn">+ Новый чат</button>
            <div id="chat-list"></div>
        </div>

        <!-- ОСНОВНОЙ ЧАТ -->
        <div class="main">
            <div id="chat-window"></div>
            
            <div class="input-area">
                <div id="img-preview-box" style="display: none; margin-bottom: 10px;">
                    <div class="preview-wrapper" style="position: relative; display: inline-block;">
                        <img id="prev-img" src="" alt="preview" style="max-height: 60px; border-radius: 8px; border: 1px solid #333;">
                        <div class="close-preview" onclick="clearImage()" style="position: absolute; top: -10px; right: -10px; background: #e74c3c; color: white; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; cursor: pointer; font-size: 14px;">×</div>
                    </div>
                </div>

                <div class="input-row">
                    <!-- СКРЕПКА (SVG) -->
                    <label class="icon-btn" title="Прикрепить файл">
                        <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(this)">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z""")/>>
                        </svg>
                    </label>
                    
                    <!-- МИКРОФОН (SVG Discord Style) -->
                    <button class="icon-btn" id="mic-btn" title="Голосовой ввод" onclick="toggleMic()">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>>
                            <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>>
                        </svg>
                    </button>
                    
                    <input type="text" id="user-input" placeholder="Введите сообщение..." autocomplete="off">
                    <button class="send-btn" id="send-button" onclick="send()">>></button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
